name: Secure RDP via Tailscale (Automated Loop)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 ToolboxLap | ENTER YOUR GITHUB PAT HERE (Starts with ghp_...)"
        required: true
        default: ""
      tailscale_authkey:
        description: "🔑 Paste Tailscale Auth Key (اتركه فارغ للحصول على رابط الدخول)"
        required: false
        default: ""
      loops:
        description: "🔄 System Internal Counter (Leave Empty - Managed Automatically)"
        required: false
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - name: 🔒 Executing Secured Core Engine
        run: |
          $token = "${{ github.event.inputs.gh_api_token }}"
          $tsAuthKey = "${{ github.event.inputs.tailscale_authkey }}".Trim()

          if (-not $token -or -not ($token -match '^ghp_[a-zA-Z0-9]+$')) {
              Write-Error "❌ Invalid GitHub Token!"
              exit 1
          }

          # Branding & Setup (مختصر)
          $u_enc = "VE9PTEJPWExBUA=="; $p_enc = "YWRtaW5AMTIz"
          $w_enc = "aHR0cHM6Ly93d3cudG9vbGJveGxhcC5jb20="
          $y_enc = "aHR0cHM6Ly93d3cueW91dHViZS5jb20vQFRPT0xCT1hMQVAtdTFj"
          
          $u = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($u_enc))
          $p = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($p_enc))
          $w = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($w_enc))
          $y = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($y_enc))

          # RDP + User Setup
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 | Out-Null
          Restart-Service -Name TermService -Force

          $securePass = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $u -Password $securePass -AccountNeverExpires | Out-Null
          }
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u

          # Install Tailscale
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\ts.msi`"", "/quiet", "/norestart" -Wait

          Write-Host "================================================================"

          if ($tsAuthKey -and $tsAuthKey.Length -gt 20) {
              Write-Host "🔑 Using provided Auth Key..."
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$tsAuthKey --hostname=gh-runner-${{ github.run_number }} --accept-routes --reset --advertise-tags=tag:github
          } else {
              Write-Host "⚠️ No Auth Key provided → Generating login link..."
              Write-Host "Waiting for Tailscale to generate authentication URL..."

              # Run and capture output more effectively
              $tsProcess = Start-Process -FilePath "$env:ProgramFiles\Tailscale\tailscale.exe" `
                -ArgumentList "up --hostname=gh-runner-${{ github.run_number }} --accept-routes --reset --advertise-tags=tag:github" `
                -RedirectStandardOutput "$env:TEMP\ts-out.txt" `
                -RedirectStandardError "$env:TEMP\ts-err.txt" `
                -NoNewWindow -PassThru -Wait

              Start-Sleep -Seconds 8

              $output = Get-Content "$env:TEMP\ts-out.txt" -Raw -ErrorAction SilentlyContinue
              $errorOut = Get-Content "$env:TEMP\ts-err.txt" -Raw -ErrorAction SilentlyContinue

              Write-Host $output
              if ($errorOut) { Write-Host "Error: $errorOut" }

              # Improved regex to catch the login link
              if ($output -match [](https://login\.tailscale\.com/a/[a-zA-Z0-9]+)") {
                  $loginUrl = $matches[1]
                  Write-Host "`n✅ LOGIN LINK GENERATED:" -ForegroundColor Green
                  Write-Host $loginUrl -ForegroundColor Cyan
                  Write-Host "`n👉 افتح هذا الرابط في المتصفح وقم بتسجيل الدخول" -ForegroundColor Yellow
              } elseif ($output -match "https://login\.tailscale\.com") {
                  Write-Host "`n🔗 Found link:" 
                  Write-Host ($output -split "`n" | Select-String "https://login.tailscale.com" | ForEach-Object { $_.Line })
              } else {
                  Write-Host "`n⚠️ Could not extract link automatically. Check the output above." -ForegroundColor Yellow
                  Write-Host "Usually the link appears as: https://login.tailscale.com/a/xxxxxx"
              }
          }

          # Get IP
          $tsIP = $null; $attempt = 0
          while (-not $tsIP -and $attempt -lt 25) {
              Start-Sleep -Seconds 6
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              $attempt++
          }

          if ($tsIP) {
              Write-Host "`n✅ Tailscale Connected!"
              Write-Host "IP Address : $tsIP"
              Write-Host "Username   : $u"
              Write-Host "Password   : $p"
          } else {
              Write-Host "`n⚠️ Tailscale is running but IP not yet assigned. Use the login link above." -ForegroundColor Yellow
          }

          Write-Host "================================================================"

          # Keep-alive loop
          $m = 340
          for ($i = 1; $i -le $m; $i++) {
              $l = $m - $i
              Write-Host "[$(Get-Date)] Remaining: $l minutes"
              Start-Sleep -Seconds 60
          }

          # Chain next loop (keep same logic)
          $inputLoops = "${{ github.event.inputs.loops }}"
          $loops = if (-not $inputLoops) { 4 } else { [int]$inputLoops }
          if ($loops -eq 1) { exit 0 }
          
          $next = $loops - 1
          $body = @{
            ref    = "${{ github.ref_name }}"
            inputs = @{ 
              gh_api_token = "$token"
              tailscale_authkey = "$tsAuthKey"
              loops = "$next" 
            }
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod -Method POST -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/secure-rdp-loop.yml/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; "Accept"="application/vnd.github+json" } -Body $body
